<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papi Analyzer - Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1c1e21;
            --accent: #0d6efd;
            --glow: rgba(13, 110, 253, 0.25);
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6b8dd6 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 45px;
            width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .form-control {
            background: #fdfdfd;
            border: 2px solid #e9ecef;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        /* Input Group Glow Handling */
        .input-group:focus-within .form-control,
        .input-group:focus-within .input-group-text {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--glow);
            background: #fff;
        }

        .input-group-text {
            background: #fdfdfd;
            border: 2px solid #e9ecef;
            border-left: none;
            border-radius: 0 12px 12px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .password-input { border-right: none; border-radius: 12px 0 0 12px !important; }

        .btn-auth {
            background: linear-gradient(to right, #1c1e21, #434343);
            color: white; border: none; padding: 14px; border-radius: 12px;
            width: 100%; font-weight: 700; margin-top: 25px; transition: all 0.3s ease;
        }

        .btn-auth:hover { transform: scale(1.02); color: #fff; }
        .toggle-link { color: var(--accent); cursor: pointer; font-weight: 700; text-decoration: none; }
        .hidden-form { display: none; }
        .alert-area { position: absolute; top: 30px; width: 100%; max-width: 420px; z-index: 1000; }
    </style>
</head>
<body>

<div class="alert-area">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show shadow" role="alert">
            <i class="bi {{ 'bi-check-circle-fill' if category == 'success' else 'bi-exclamation-triangle-fill' }} me-2"></i>
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>

<div class="auth-card">
    <div class="text-center mb-5">
        <h2 class="fw-bold text-dark">
            <i class="bi bi-folder2-open text-primary me-2"></i>Papi Analyzer
        </h2>
    </div>

    <div id="loginForm">
        <form action="/login" method="POST">
            <div class="mb-4">
                <label class="small fw-bold text-muted mb-2 text-uppercase">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="small fw-bold text-muted mb-2 text-uppercase">Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="loginPass" class="form-control password-input" required>
                    <span class="input-group-text" onclick="togglePass('loginPass', 'loginIcon')">
                        <i class="bi bi-eye-slash" id="loginIcon"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-auth">Sign In</button>
        </form>
        <p class="text-center mt-4 small text-muted">New here? <span class="toggle-link" onclick="toggleForm()">Create account</span></p>
    </div>

    <div id="signupForm" class="hidden-form">
        <h4 class="fw-bold mb-4 text-dark text-center">Get Started</h4>
        <form action="/signup" method="POST">
            <div class="mb-4">
                <label class="small fw-bold text-muted mb-2 text-uppercase">Full Name</label>
                <input type="text" name="full_name" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="small fw-bold text-muted mb-2 text-uppercase">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="small fw-bold text-muted mb-2 text-uppercase">Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="signupPass" class="form-control password-input" required>
                    <span class="input-group-text" onclick="togglePass('signupPass', 'signupIcon')">
                        <i class="bi bi-eye-slash" id="signupIcon"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-auth">Register Now</button>
        </form>
        <p class="text-center mt-4 small text-muted">Have an account? <span class="toggle-link" onclick="toggleForm()">Sign in</span></p>
    </div>
</div>

<script>
    function toggleForm() {
        document.getElementById('loginForm').classList.toggle('hidden-form');
        document.getElementById('signupForm').classList.toggle('hidden-form');
    }

    function togglePass(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        } else {
            input.type = "password";
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
